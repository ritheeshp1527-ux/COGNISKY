<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>COGNISKY - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: sans-serif; overflow: hidden; height: 100vh; }
    .calm-gradient {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(270deg, rgba(147,197,253,0.6), rgba(167,243,208,0.6), rgba(196,181,253,0.6), rgba(251,207,232,0.6)),
        url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1950&q=80') center/cover no-repeat;
      background-blend-mode: overlay; z-index: -1;
    }
    .glass-card {
      background: rgba(255,255,255,0.4); backdrop-filter: blur(20px); border-radius: 2rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.1); padding: 3rem; max-width: 450px; width: 100%;
      text-align: center; border: 1px solid rgba(255,255,255,0.3); z-index: 1;
    }
  </style>
</head>
<body class="flex justify-center items-center min-h-screen text-gray-800">
  <div class="calm-gradient"></div>
  <div class="glass-card">
    <h1 class="text-3xl font-bold text-teal-700 mb-6">Welcome Back</h1>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="mb-4 px-4 py-2 rounded-xl text-sm 
            {% if category == 'danger' %} bg-red-100 text-red-800 {% else %} bg-teal-100 text-teal-800 {% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/login" class="space-y-4">
      <div>
        <input type="text" name="username" placeholder="Username" required
          class="w-full px-4 py-3 rounded-xl border-none focus:ring-2 focus:ring-teal-400 shadow-inner bg-white/70">
      </div>
      <div>
        <input type="password" name="password" placeholder="Password" required
          class="w-full px-4 py-3 rounded-xl border-none focus:ring-2 focus:ring-teal-400 shadow-inner bg-white/70">
      </div>
      <button type="submit" class="w-full py-3 bg-teal-600 text-white font-semibold rounded-xl shadow-lg hover:bg-teal-700 transition transform hover:scale-105">
        Login
      </button>
    </form>
    <p class="mt-6 text-gray-600">Don't have an account? <a href="/register" class="text-teal-700 font-semibold hover:underline">Register</a></p>
  </div>
</body>
</html>
